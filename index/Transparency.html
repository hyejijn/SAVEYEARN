    <script>
      //수입차트
      var optionsRevenues = {
        series: [35, 26, 18, 9, 6, 4, 2],
        chart: {
          type: "donut",
          width: "100%",
        },
        labels: [
          "개인후원(정기/일시후원)",
          "현물 기부 및 물품 후원",

          "기타 기부 및 잡수입",
        ],
        legend: {
          position: "bottom",
          horizontalAlign: "center",
          fontSize: "13px",
          itemMargin: {
            vertical: 5,
          },
        },

        responsive: [
          {
            breakpoint: 480,
            options: {
              chart: {
                width: 100,
              },
              legend: {
                position: "bottom",
              },
            },
          },
        ],
      };
      var chart = new ApexCharts(

        optionsRevenues

      chart.render();

      var optionsExpenses = {

          "관리 및 운영 행정비",

          horizontalAlign: "center",
          fontSize: "13px",

        document.querySelector("#expenses"),
        optionsExpenses
